name: SecureMed Chat CI

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.11"
        enable-cache: true
        
    - name: Install dependencies
      run: |
        uv sync --all-extras --dev
        
    - name: Run linting
      run: |
        uv run ruff check . || echo "Ruff failed, but continuing for now."
        
    - name: Run tests with pytest
      env:
        PYTHONPATH: src
        SECUREMED_API_KEY: ci_test_key_123
        GOOGLE_CLOUD_PROJECT: ci_test_project
      run: |
        uv run pytest tests/ -v
