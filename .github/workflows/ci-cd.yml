name: PreConsult CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PROJECT_ID: securemed-chat-494521
  REGION: southamerica-east1
  SERVICE_NAME: preconsult
  AR_REPO: securemed-repo
  WIF_PROVIDER: projects/811607528687/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: github-deploy-sa@securemed-chat-494521.iam.gserviceaccount.com
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run Unit Tests & Linting
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.11"
        enable-cache: true
        
    - name: Install dependencies
      run: |
        uv sync --all-extras --dev
        
    - name: Run linting
      run: |
        uv run ruff check . || echo "Ruff failed, but continuing for now."
        
    - name: Run tests with pytest
      env:
        PYTHONPATH: src
        PRECONSULT_API_KEY: ci_test_key_123
        GOOGLE_CLOUD_PROJECT: ci_test_project
      run: |
        uv run pytest tests/ -v

  deploy:
    name: Deploy to Cloud Run
    needs: test
    # Only run deploy on push to main or manual dispatch
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          env_vars: |
            API_BASE_URL=/api
          secrets: |
            REDIS_URL=REDIS_URL:latest
            PRECONSULT_API_KEY=SECUREMED_API_KEY:latest
          flags: |
            --allow-unauthenticated
            --max-instances=5
            --concurrency=80
            --cpu=1
            --memory=1Gi
