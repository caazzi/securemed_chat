version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8080"
    environment:
      - SECUREMED_API_KEY=dev_key_123
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ./src:/app/src

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
